name: ci-testing 

on: 
  push:
    branches:
      - main 
  pull_request:
    branches:
      - main 

env:
    TEST_IMAGE_PY_VERSION: "3.12"

jobs:

    style-check:
        runs-on: ubuntu-latest 
        steps:
            - name: Checkout Repository 
              uses: actions/checkout@v4

            - name: Setup Python 
              uses: actions/setup-python@v5 
              with:
                python-version: ${{ env.TEST_IMAGE_PY_VERSION }}

            - name: Install requirements 
              run: | 
                python -m pip install --upgrade pip 
                pip install ruff 

            - name: Run the linter 
              run: ruff check 

            - name: Run the format checker  
              run: ruff format --check 

    pytest: 
        runs-on: ubuntu-latest

        permissions:
            contents: read 
            packages: read
            
        strategy:
            matrix:
                python-version: ["3.10", "3.11", "3.12"]

        steps:
            - name: Checkout Repo
              uses: actions/checkout@v4 

            - name: Setup Python ${{ matrix.python-version }}
              uses: actions/setup-python@v5 
              with:
                python-version: ${{ matrix.python-version }}

            - name: Install the package and requirements 
              run: | 
                python -m pip install --upgrade pip 
                pip install .[dev]

            - name: Log in to GitHub Container Registry]
              if: contains(matrix.python-version, env.TEST_IMAGE_PY_VERSION)
              uses: docker/login-action@v3
              with:
                registry: ghcr.io
                username: ${{ github.actor }}
                password: ${{ secrets.GITHUB_TOKEN }}

            - name: Run the test suite with coverage 
              if: contains(matrix.python-version, env.TEST_IMAGE_PY_VERSION)
              run: |
                PYTEST_CMD='pytest --cov=aiida_chemshell --cov-report=xml:/home/chemsh_usr/aiida-chemshell/coverage.xml aiida-chemshell/' 
                IMAGE_NAME=ghcr.io/stfc/aiida-chemshell/test:latest 
                docker run --rm -v $(pwd):/home/chemsh_usr/aiida-chemshell $IMAGE_NAME $PYTEST_CMD 

            - name: Run the test suite without coverage 
              if: ${{ ! contains(matrix.python-version, env.TEST_IMAGE_PY_VERSION) }}
              run: pytest tests/test_inputs.py

            - name: Report coverage to Coveralls 
              if: contains(matrix.python-version, env.TEST_IMAGE_PY_VERSION)
              uses: coverallsapp/github-action@v2 
              with: 
                file: coverage.xml 
                base-path: aiida_chemshell